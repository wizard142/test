<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            position: fixed;
            background: #111827;
            padding: 20px;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .card-box {
            background: #1f2937;
            padding: 20px;
            border-radius: 10px;
        }

        table {
            color: white;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>Admin Panel</h4>
    <a href="/logout" class="btn btn-danger btn-sm mt-3">Logout</a>
</div>

<div class="content">

    <h2>Dashboard</h2>

    <div class="card-box mt-3">
        <h5>Submitted Data</h5>

        <table class="table table-dark table-striped mt-3">
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Password</th>
            </tr>

            {% for item in items %}
            <tr>
                <td>{{ item[0] }}</td>
                <td>{{ item[1] }}</td>
                <td>{{ item[2] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
